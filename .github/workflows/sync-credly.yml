name: Sync Credly badges

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        working-directory: website
        run: bun install --frozen-lockfile
      - name: Fetch Credly
        working-directory: website
        run: bun run sync:credly
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(credly): weekly badge sync"
          title: "chore(credly): weekly badge sync"
          body: |
            Automated weekly Credly badge sync.

            Review the diff before merging — a manual decision on whether any
            new badges should be added to `website/data/credly/featured.json`.
          branch: chore/credly-sync
          delete-branch: true
          add-paths: website/data/credly/badges.json
